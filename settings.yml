use_default_settings: true

general:
  instance_name: "miuSearch backend"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

search:
  safe_search: 1
  autocomplete: ""
  default_lang: "es"
  # Esta línea es LA clave: sin esto, /search?format=json da error 403
  formats:
    - html
    - json

server:
  # Cambia esto por una cadena aleatoria propia (openssl rand -hex 32)
  secret_key: "arektennyson2026"
  limiter: false
  image_proxy: true
  method: "GET"

ui:
  static_use_hash: true

# Motores recomendados: livianos y estables para web/imagenes/video
engines:
  - name: google
    disabled: false
  - name: bing
    disabled: false
  - name: duckduckgo
    disabled: false
  - name: google images
    disabled: false
  - name: bing images
    disabled: false
  - name: duckduckgo images
    disabled: false
  - name: youtube
    disabled: false
  - name: bing videos
    disabled: false
